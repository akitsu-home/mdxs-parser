name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Target release tag (e.g. v0.0.1)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      SCOOP_BUCKET_TOKEN: ${{ secrets.SCOOP_BUCKET_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew tap formula (optional)
        if: ${{ env.HOMEBREW_TAP_TOKEN != '' }}
        env:
          HOMEBREW_TAP_REPO: owner/homebrew-tap
          APP_NAME: mdxs-parser
          VERSION: ${{ github.ref_name }}
        run: ./scripts/update-homebrew-formula.sh

      - name: Update Scoop bucket manifest (optional)
        if: ${{ env.SCOOP_BUCKET_TOKEN != '' }}
        env:
          SCOOP_BUCKET_REPO: owner/scoop-bucket
          APP_NAME: mdxs-parser
          VERSION: ${{ github.ref_name }}
        run: ./scripts/update-scoop-manifest.sh

  upload-release-assets:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      APP_NAME: mdxs-parser
      TARGET_VERSION: ${{ github.event.inputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate target tag format
        run: |
          if [[ ! "${TARGET_VERSION}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid tag format: ${TARGET_VERSION} (expected: vX.Y.Z)" >&2
            exit 1
          fi

      - name: Ensure release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release view "${TARGET_VERSION}"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
          cache: true

      - name: Build archives and checksums
        run: |
          set -euo pipefail
          mkdir -p dist/release-assets
          COMMIT="$(git rev-parse --short HEAD)"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          for OS in darwin linux windows; do
            for ARCH in amd64 arm64; do
              DIR="${APP_NAME}_${TARGET_VERSION}_${OS}_${ARCH}"
              mkdir -p "dist/release-assets/${DIR}"

              BIN_NAME="${APP_NAME}"
              if [[ "${OS}" == "windows" ]]; then
                BIN_NAME="${APP_NAME}.exe"
              fi

              GOOS="${OS}" GOARCH="${ARCH}" CGO_ENABLED=0 go build \
                -ldflags "-s -w -X github.com/owner/mdxs-parser/internal/version.Version=${TARGET_VERSION} -X github.com/owner/mdxs-parser/internal/version.Commit=${COMMIT} -X github.com/owner/mdxs-parser/internal/version.Date=${DATE}" \
                -o "dist/release-assets/${DIR}/${BIN_NAME}" ./cmd/${APP_NAME}

              if [[ "${OS}" == "windows" ]]; then
                (cd dist/release-assets && zip -rq "${DIR}.zip" "${DIR}")
              else
                tar -C dist/release-assets -czf "dist/release-assets/${DIR}.tar.gz" "${DIR}"
              fi
            done
          done

          (cd dist/release-assets && sha256sum *.tar.gz *.zip > checksums.txt)

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${TARGET_VERSION}" dist/release-assets/*.tar.gz dist/release-assets/*.zip dist/release-assets/checksums.txt --clobber
