name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew tap formula (optional)
        if: ${{ secrets.HOMEBREW_TAP_TOKEN != '' }}
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          HOMEBREW_TAP_REPO: owner/homebrew-tap
          APP_NAME: mdxs-parser
          VERSION: ${{ github.ref_name }}
        run: ./scripts/update-homebrew-formula.sh

      - name: Update Scoop bucket manifest (optional)
        if: ${{ secrets.SCOOP_BUCKET_TOKEN != '' }}
        env:
          SCOOP_BUCKET_TOKEN: ${{ secrets.SCOOP_BUCKET_TOKEN }}
          SCOOP_BUCKET_REPO: owner/scoop-bucket
          APP_NAME: mdxs-parser
          VERSION: ${{ github.ref_name }}
        run: ./scripts/update-scoop-manifest.sh
